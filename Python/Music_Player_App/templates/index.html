<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Música</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Barra lateral -->
        <aside class="sidebar">
            <div class="logo">
                <h1>🎵 Reproductor de Música</h1>
            </div>
            
            <nav class="nav-menu">
                <div class="nav-item active" data-view="home">
                    <span class="icon">🏠</span>
                    <span>Inicio</span>
                </div>
                <div class="nav-item" data-view="search">
                    <span class="icon">🔍</span>
                    <span>Buscar</span>
                </div>
                <div class="nav-item" data-view="history">
                    <span class="icon">🕒</span>
                    <span>Historial</span>
                </div>
                <div class="nav-item" data-view="recommendations">
                    <span class="icon">✨</span>
                    <span>Para ti</span>
                </div>
            </nav>
        </aside>

        <!-- Contenido principal -->
        <main class="main-content">
            <!-- Encabezado con búsqueda -->
            <header class="header">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Buscar canciones, artistas..." />
                    <button id="search-btn">🔍</button>
                </div>
            </header>

            <!-- Vistas de contenido -->
            <div class="content-view" id="home-view">
                <h2>Música en Tendencia</h2>
                <div id="trending-grid" class="video-grid"></div>
            </div>

            <div class="content-view hidden" id="search-view">
                <h2 id="search-title">Resultados de búsqueda</h2>
                <div id="search-results" class="video-grid"></div>
            </div>

            <div class="content-view hidden" id="history-view">
                <h2>Reproducido recientemente</h2>
                <div id="history-list" class="video-grid"></div>
            </div>

            <div class="content-view hidden" id="recommendations-view">
                <h2>Recomendado para ti</h2>
                <div id="recommendations-grid" class="video-grid"></div>
            </div>
        </main>
    </div>

    <!-- Reproductor -->
    <div class="player-container">
        <div class="player-info">
            <div class="video-container" id="video-container">
                <video id="video-player" controls></video>
                <div class="video-placeholder" id="video-placeholder">
                    <span>🎵</span>
                    <p>No hay ningún video reproduciéndose</p>
                </div>
            </div>
            <div class="track-info">
                <div class="track-title" id="track-title">Selecciona una canción</div>
                <div class="track-artist" id="track-artist">Artista</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <button id="prev-btn" title="Anterior">⏮</button>
                <button id="play-pause-btn" class="play-btn" title="Reproducir">▶</button>
                <button id="next-btn" title="Siguiente">⏭</button>
                <button id="shuffle-btn" title="Aleatorio">🔀</button>
                <button id="repeat-btn" title="Repetir">🔁</button>
            </div>
            
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                    <input type="range" id="progress-bar" min="0" value="0" step="1" />
                </div>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="player-extras">
            <div class="volume-control">
                <button id="volume-btn">🔊</button>
                <input type="range" id="volume-slider" min="0" max="100" value="70" />
            </div>
            <button id="autoplay-btn" class="active" title="Reproducción automática activada">↻</button>
        </div>
    </div>

    <!-- Indicador de carga -->
    <div class="loading-spinner hidden" id="loading-spinner">
        <div class="spinner"></div>
    </div>

    <!-- Notificación -->
    <div class="notification hidden" id="notification"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
